services:
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: ${TASK_DB_PASSWORD:-default_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U taskuser -d taskmanager_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: task-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager_db
      SPRING_DATASOURCE_USERNAME: taskuser
      SPRING_DATASOURCE_PASSWORD: ${TASK_DB_PASSWORD:-default_pass}
    ports:
      - "8080:8080"

volumes:
  postgres_data: